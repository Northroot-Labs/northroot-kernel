name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.0"
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.0"
          components: clippy
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.0"
      - name: Run tests
        run: cargo test --all --all-features

  golden:
    name: Golden Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.0"
      - name: Run golden tests
        run: cargo test --package northroot-canonical --test golden

  schema:
    name: Schema Parse Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON schema files parse
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path("schemas")
          files = sorted(root.rglob("*.schema.json"))
          if not files:
              raise SystemExit("no schema files found")
          for path in files:
              with path.open("r", encoding="utf-8") as f:
                  json.load(f)
          print(f"validated {len(files)} schema files")
          PY

  docs:
    name: Documentation
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.0"
      - name: Build documentation
        run: cargo doc --workspace --no-deps
      - name: Run doctests
        run: cargo test --workspace --doc

  cli:
    name: CLI Tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.0"
      - name: Run CLI tests
        run: cargo test --manifest-path apps/northroot/Cargo.toml

